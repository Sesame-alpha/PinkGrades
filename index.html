<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PinkGrades</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container py-4">

  <!-- TITLE -->
  <div class="text-center mb-4">
    <h1 class="fw-bold title">🌸 Pink Grades 🌸</h1>
    <p class="text-muted">Simple Academic Performance Tracker</p>
  </div>

  <!-- STATS -->
  <div class="row g-3 mb-4">

    <div class="col-12 col-md-4">
      <div class="card p-3 text-center shadow-sm">
        <h5>Average</h5>
        <h3 id="avg">0</h3>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card p-3 text-center shadow-sm">
        <h5>Best Module</h5>
        <h3 id="best">-</h3>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card p-3 text-center shadow-sm">
        <h5>Lowest Module</h5>
        <h3 id="avgModule">-</h3>
      </div>
    </div>

  </div>

  <!-- INPUT -->
  <div class="card p-3 mb-4 shadow-sm">

    <h5 class="mb-3">Add Grade</h5>

    <div class="row g-2">

      <div class="col-12 col-md-3">
        <input id="module" class="form-control" placeholder="Module">
      </div>

      <div class="col-12 col-md-3">
        <input id="marks" type="number" class="form-control" placeholder="Marks">
      </div>

      <div class="col-6 col-md-3">
        <select id="year" class="form-select">
          <option value="1">Year 1</option>
          <option value="2">Year 2</option>
          <option value="3">Year 3</option>
          <option value="4">Year 4</option>
        </select>
      </div>

      <div class="col-6 col-md-3">
        <select id="semester" class="form-select">
          <option value="1">Sem 1</option>
          <option value="2">Sem 2</option>
        </select>
      </div>

    </div>

    <button onclick="addGrade()" class="btn btn-pink mt-3 w-100">
      Add Grade
    </button>

  </div>

  <!-- CHARTS -->
  <div class="card p-3 mb-4 shadow-sm">

    <h5 class="mb-3">Analytics</h5>

    <canvas id="lineChart"></canvas>
    <canvas id="barChart"></canvas>
    <canvas id="pieChart"></canvas>

  </div>

  <!-- INSIGHTS -->
  <div class="card p-3 mb-4 shadow-sm">

    <h5>AI Insights</h5>
    <p id="insightText">No data yet</p>

  </div>

  <!-- GOAL -->
  <div class="card p-3 shadow-sm">

    <h5>Goal Progress</h5>

    <div class="progress">
      <div id="progressBar" class="progress-bar bg-pink"></div>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
