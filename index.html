<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinkGrades</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --pink-hot:   #ff0a78;
      --pink-mid:   #ff4fa3;
      --pink-soft:  #ff8ccf;
      --pink-pale:  #ffd1e8;
      --pink-bg:    #fff5fa;
      --dark:       #1a0a10;
      --card-bg:    #ffffff;
      --border:     #ffe0ef;
      --muted:      #b37a92;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--pink-bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--dark);
      min-height: 100vh;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: var(--pink-hot);
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      font-weight: 300;
    }

    .card {
      border: 1.5px solid var(--border);
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: 0 4px 24px rgba(255,10,120,.06);
    }

    .card h5 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--pink-hot);
      margin-bottom: .75rem;
    }

    .stat-card { border-top: 3px solid var(--pink-hot); }

    .stat-card h5 {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      margin-bottom: .25rem;
    }

    .stat-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--pink-hot);
      margin: 0;
    }

    .form-control, .form-select {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff8fb;
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      padding: .55rem .85rem;
      transition: border-color .2s;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--pink-hot);
      box-shadow: 0 0 0 3px rgba(255,10,120,.12);
      background: #fff;
      outline: none;
    }

    .btn-pink {
      background: var(--pink-hot);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .6rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: .9rem;
      letter-spacing: .02em;
      margin-top: .75rem;
      transition: background .2s, transform .1s, box-shadow .2s;
    }

    .btn-pink:hover {
      background: #d4006a;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,10,120,.3);
      color: #fff;
    }

    .btn-pink:active { transform: translateY(0); }

    .progress {
      height: 12px;
      border-radius: 99px;
      background: var(--pink-pale);
      overflow: hidden;
    }

    .progress-bar {
      background: linear-gradient(90deg, var(--pink-hot), var(--pink-soft));
      border-radius: 99px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    .progress-label {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .35rem;
    }

    #insightText {
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.6;
    }

    canvas + canvas { margin-top: 2rem; }

    .section-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--pink-mid);
      margin-bottom: .5rem;
    }

    @media (max-width: 576px) {
      .stat-card h3 { font-size: 1.5rem; }
    }
  </style>
</head>

<body>
<div class="container py-5" style="max-width:780px">

  <div class="text-center mb-5">
    <h1 class="title">🌸Pink Grades🌸</h1>
    <p class="subtitle">Academic Performance Tracker</p>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-4">
      <div class="card p-3 text-center stat-card">
        <h5>Average</h5>
        <h3 id="avg">—</h3>
      </div>
    </div>
    <div class="col-4">
      <div class="card p-3 text-center stat-card">
        <h5>Best Module</h5>
        <h3 id="best" style="font-size:1.1rem;margin-top:.35rem">—</h3>
      </div>
    </div>
    <div class="col-4">
      <div class="card p-3 text-center stat-card">
        <h5>Lowest Module</h5>
        <h3 id="avgModule" style="font-size:1.1rem;margin-top:.35rem">—</h3>
      </div>
    </div>
  </div>

  <div class="card p-3 mb-3">
    <h5>Filter Results</h5>
    <div class="row g-2">
      <div class="col-6">
        <select id="filterYear" class="form-select">
          <option value="all">All Years</option>
          <option value="1">Year 1</option>
          <option value="2">Year 2</option>
          <option value="3">Year 3</option>
          <option value="4">Year 4</option>
        </select>
      </div>
      <div class="col-6">
        <select id="filterSemester" class="form-select">
          <option value="all">All Semesters</option>
          <option value="1">Sem 1</option>
          <option value="2">Sem 2</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card p-3 mb-4">
    <h5>Add Grade</h5>
    <div class="row g-2">
      <div class="col-12 col-md-6">
        <input id="module" class="form-control" placeholder="Module name">
      </div>
      <div class="col-12 col-md-6">
        <input id="marks" type="number" min="0" max="100" class="form-control" placeholder="Marks (0–100)">
      </div>
      <div class="col-12 col-md-6">
        <select id="year" class="form-select">
          <option value="1">Year 1</option>
          <option value="2">Year 2</option>
          <option value="3">Year 3</option>
          <option value="4">Year 4</option>
        </select>
      </div>
      <div class="col-12 col-md-6">
        <select id="semester" class="form-select">
          <option value="1">Semester 1</option>
          <option value="2">Semester 2</option>
        </select>
      </div>
    </div>
    <button onclick="addGrade()" class="btn btn-pink">+ Add Grade</button>
  </div>

  <div class="card p-3 mb-4">
    <h5>Analytics</h5>
    <p class="section-label">Performance Line</p>
    <canvas id="lineChart"></canvas>
    <p class="section-label mt-4">Module Averages</p>
    <canvas id="barChart"></canvas>
    <p class="section-label mt-4">Grade Zones</p>
    <canvas id="pieChart"></canvas>
  </div>

  <div class="card p-3 mb-4">
    <h5>Insights</h5>
    <p id="insightText">Add grades to see insights.</p>
  </div>

  <div class="card p-3">
    <h5>Goal Progress <span style="font-size:.8rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400">(target: 70)</span></h5>
    <div class="progress">
      <div id="progressBar" class="progress-bar" style="width:0%"></div>
    </div>
    <p class="progress-label" id="progressLabel">No data yet</p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
